    <circle cx="0" cy="-1" r="9" fill="url(#tdPlatter)" stroke="#0a0a0a" stroke-width="0.6"/>
    <circle cx="0" cy="-1" r="2" fill="#0a0a0a"/>
    <circle cx="0" cy="-1" r="0.6" fill="#fde047"/>
    <g stroke="#1f2937" stroke-width="0.3" fill="none" opacity="0.6">
