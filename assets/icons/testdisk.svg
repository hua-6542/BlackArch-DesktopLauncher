      <stop offset="0" stop-color="#374151"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="tdPlatter" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9ca3af"/>
      <stop offset="0.7" stop-color="#4b5563"/>
      <stop offset="1" stop-color="#1f2937"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#0a0a0a"/>
  <g font-family="monospace" font-size="2.4" fill="#22c55e" opacity="0.5">
