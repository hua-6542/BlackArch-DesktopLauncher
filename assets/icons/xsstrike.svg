<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="patbody" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffd5e8"/>
      <stop offset="0.6" stop-color="#ff85c0"/>
      <stop offset="1" stop-color="#c2185b"/>
    </radialGradient>
    <linearGradient id="pant" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- 五角海星身体 -->
  <path d="M32 4 Q34 22 50 18 Q54 18 50 28 Q42 36 48 50 Q48 54 38 48 Q32 44 26 48 Q16 54 16 50 Q22 36 14 28 Q10 18 14 18 Q30 22 32 4 Z"
